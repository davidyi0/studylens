# local dev stack 

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-studylens}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-studylens}
      POSTGRES_DB: ${POSTGRES_DB:-studylens}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      # `api` waits until Postgres actually accepts connections, not just "container started".
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-studylens}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  chromadb:
    image: chromadb/chroma:0.5.5
    ports:
      - "8001:8000"          # host 8001 -> container 8000 (avoids clashing with the api port)
    volumes:
      - chromadata:/chroma/chroma

  api:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app        # bind mount -> uvicorn --reload sees code edits live
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_started

volumes:
  pgdata:
  chromadata:
